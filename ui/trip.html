<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Slice of Life — Trip</title>
  <link rel="stylesheet" href="/icons/tabler-icons.min.css">
  <link rel="stylesheet" href="/css/main.css">
  <style>
    .content {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      flex: 1; padding: 40px; gap: 24px; text-align: center;
    }
    .stage-icon  { font-size: 44px; color: #5B9EF0; }
    .stage-title { font-size: 19px; font-weight: 600; color: #FFF; }

    .progress-track {
      width: 100%; max-width: 340px; height: 3px;
      background: rgba(255,255,255,0.07); border-radius: 2px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; background: linear-gradient(90deg,#1E5FC8,#5B9EF0);
      border-radius: 2px; transition: width 0.6s ease; width: 0%;
    }
    @keyframes progress-shimmer {
      0%   { background-position: -200% center; }
      100% { background-position: 200% center; }
    }
    .progress-fill.working {
      background: linear-gradient(90deg, #1E5FC8 0%, #5B9EF0 50%, #1E5FC8 100%);
      background-size: 200% 100%;
      animation: progress-shimmer 1.8s linear infinite;
    }

    .steps { display: flex; flex-direction: column; width: 100%; max-width: 340px; gap: 0; }
    .step {
      display: flex; align-items: center; gap: 14px;
      padding: 11px 0; border-bottom: 1px solid rgba(255,255,255,0.04);
      transition: opacity 0.4s; opacity: 0.3;
    }
    .step:last-child { border-bottom: none; }
    .step.done   { opacity: 0.45; }
    .step.active { opacity: 1; }
    .step-icon {
      width: 32px; height: 32px; border-radius: 10px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; font-size: 15px;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
      color: #3A6090; transition: background 0.4s, color 0.4s, border-color 0.4s;
    }
    .step.active .step-icon { background: rgba(91,158,240,0.15); border-color: rgba(91,158,240,0.3); color: #5B9EF0; }
    .step.done   .step-icon { background: rgba(30,95,200,0.12);  border-color: rgba(30,95,200,0.2);  color: #1E5FC8; }
    .step-text   { display: flex; flex-direction: column; gap: 2px; text-align: left; }
    .step-label  { font-size: 13px; font-weight: 500; color: #B8D0EE; transition: color 0.4s; }
    .step.active .step-label { color: #FFFFFF; }
    .step.done   .step-label { color: #4A7AB5; }
    .step-detail { font-size: 11px; color: #3A6090; line-height: 1.4; min-height: 14px; transition: color 0.3s; }
    .step.active .step-detail { color: #5B9EF0; }
    @keyframes pulse-ring {
      0%   { box-shadow: 0 0 0 0 rgba(91,158,240,0.35); }
      70%  { box-shadow: 0 0 0 6px rgba(91,158,240,0); }
      100% { box-shadow: 0 0 0 0 rgba(91,158,240,0); }
    }
    .step.active .step-icon { animation: pulse-ring 1.8s ease-out infinite; }


    /* ── Done ────────────────────────────────────────────────────────────────── */
    .done-area { display: none; flex-direction: column; align-items: center; gap: 0; width: 100%; }
    .done-area.visible { display: flex; }

    .done-header {
      width: 100%; display: flex; flex-direction: column; align-items: center;
      gap: 6px; margin-bottom: 20px;
    }
    .done-eyebrow { font-size: 10px; letter-spacing: 0.1em; color: #3A6090; font-weight: 600; transition: color 1.2s ease; }
    .done-title   { font-size: 22px; font-weight: 700; color: #FFF; }
    .done-meta    { font-size: 12px; color: #3A6090; transition: color 1.2s ease; }

    .done-journal-wrap {
      width: 100%; max-height: 200px; overflow-y: auto;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 14px; padding: 18px 20px;
      margin-bottom: 20px; text-align: left;
      scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.1) transparent;
    }
    .done-journal-wrap::-webkit-scrollbar { width: 4px; }
    .done-journal-wrap::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 2px; }
    .done-journal-text {
      font-size: 13px; color: #B8D0EE; line-height: 1.75;
      font-style: italic; white-space: pre-wrap;
    }

    .done-actions { display: flex; gap: 8px; width: 100%; }
    .btn-primary {
      flex: 2; padding: 13px;
      background: linear-gradient(135deg,#1E5FC8,#1448A0);
      border: none; border-radius: 12px;
      color: #FFF; font-size: 14px; font-weight: 600;
      cursor: pointer; font-family: inherit;
      display: flex; align-items: center; justify-content: center; gap: 7px;
      transition: opacity 0.15s;
    }
    .btn-primary:hover { opacity: 0.88; }
    .btn-secondary {
      flex: 1; padding: 13px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12); border-radius: 12px;
      color: #6A9FD4; font-size: 13px;
      cursor: pointer; font-family: inherit;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      transition: background 0.15s;
    }
    .btn-secondary:hover { background: rgba(255,255,255,0.1); }
    .btn-xml {
      flex: 1; padding: 13px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12); border-radius: 12px;
      color: #6A9FD4; font-size: 13px;
      cursor: pointer; font-family: inherit;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      transition: background 0.15s;
    }
    .btn-xml:hover { background: rgba(255,255,255,0.1); }

    .done-location {
      display: flex; align-items: center; gap: 8px; width: 100%; margin-top: 14px;
      padding: 10px 14px; background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07); border-radius: 10px;
      cursor: pointer; transition: background 0.15s;
    }
    .done-location:hover { background: rgba(255,255,255,0.06); }
    .done-location-icon  { color: #3A6090; font-size: 14px; flex-shrink: 0; }
    .done-location-path  { flex: 1; font-size: 11px; color: #3A6090; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-align: left; }
    .done-location-change { font-size: 11px; color: #3A6090; flex-shrink: 0; text-decoration: underline; }
    .done-location:hover .done-location-change { color: #6A9FD4; }
    .done-new {
      margin-top: 12px; font-size: 12px; color: #3A6090;
      background: none; border: none; cursor: pointer; font-family: inherit;
      text-decoration: underline;
    }
    .done-new:hover { color: #6A9FD4; }
  </style>
</head>
<body>
  <div class="app-window">
    <div class="title-bar">
      <div class="traffic-lights">
        <div class="dot dot-red"    onclick="window.electronAPI.windowControl('close')"></div>
        <div class="dot dot-yellow" onclick="window.electronAPI.windowControl('minimize')"></div>
        <div class="dot dot-green"  onclick="window.electronAPI.windowControl('maximize')"></div>
      </div>
      <span class="app-name">Slice of Life</span>
    </div>

    <div class="inner">
      <canvas id="orbs"></canvas>
      <div class="content">

        <!-- Processing state -->
        <div id="processing-state" style="display:flex;flex-direction:column;align-items:center;gap:20px;width:100%;">
          <div style="display:flex;flex-direction:column;align-items:center;gap:8px;">
            <i class="ti ti-map-2 stage-icon"></i>
            <div class="stage-title">Building your trip video…</div>
          </div>
          <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
          <div class="steps">
            <div class="step" id="step-scan">
              <div class="step-icon"><i class="ti ti-scan"></i></div>
              <div class="step-text">
                <div class="step-label">Scanning footage</div>
                <div class="step-detail" id="detail-scan">Finding all your clips</div>
              </div>
            </div>
            <div class="step" id="step-days">
              <div class="step-icon"><i class="ti ti-calendar"></i></div>
              <div class="step-text">
                <div class="step-label">Grouping by day</div>
                <div class="step-detail" id="detail-days">Organising your timeline</div>
              </div>
            </div>
            <div class="step" id="step-trans">
              <div class="step-icon"><i class="ti ti-microphone"></i></div>
              <div class="step-text">
                <div class="step-label">Transcribing narration</div>
                <div class="step-detail" id="detail-trans">Listening to each day</div>
              </div>
            </div>
            <div class="step" id="step-story">
              <div class="step-icon"><i class="ti ti-writing"></i></div>
              <div class="step-text">
                <div class="step-label">Writing trip story</div>
                <div class="step-detail" id="detail-story">Crafting the narrative</div>
              </div>
            </div>
            <div class="step" id="step-video">
              <div class="step-icon"><i class="ti ti-movie"></i></div>
              <div class="step-text">
                <div class="step-label">Assembling video</div>
                <div class="step-detail" id="detail-video">Cutting and exporting</div>
              </div>
            </div>
          </div>
        </div>

        <!-- Done state -->
        <div class="done-area" id="done-area">
          <div class="done-header">
            <div class="done-eyebrow" id="done-eyebrow">TRIP VIDEO READY</div>
            <div class="done-title" id="done-title">Your Trip</div>
            <div class="done-meta"  id="done-meta"></div>
          </div>
          <div class="done-journal-wrap" id="done-journal-wrap" style="display:none;">
            <div class="done-journal-text" id="done-journal-text"></div>
          </div>
          <div class="done-actions">
            <button class="btn-primary"   onclick="openVideo()"><i class="ti ti-player-play"></i> Watch</button>
            <button class="btn-secondary" onclick="openText()"> <i class="ti ti-book"></i> Read</button>
            <button class="btn-xml"       onclick="exportXML()"><i class="ti ti-brand-adobe"></i> XML</button>
          </div>
          <div class="done-location" id="done-location" onclick="revealInFinder()">
            <i class="ti ti-folder done-location-icon"></i>
            <span class="done-location-path" id="done-location-path">—</span>
            <span class="done-location-change" onclick="event.stopPropagation(); changeOutputFolder()">Change</span>
          </div>
          <button class="done-new" onclick="goHome()">← Back to home</button>
        </div>

      </div>
    </div>
  </div>

  <script src="/js/orbs.js"></script>
  <script>
    let jobId     = sessionStorage.getItem('tripJobId');
    let videoPath = null;
    let textPath  = null;
    let assembly    = null;
    let orientation = 'landscape';

    const STEPS = [
      { id: 'step-scan',  detail: 'detail-scan',  threshold: 10 },
      { id: 'step-days',  detail: 'detail-days',  threshold: 15 },
      { id: 'step-trans', detail: 'detail-trans', threshold: 30 },
      { id: 'step-story', detail: 'detail-story', threshold: 62 },
      { id: 'step-video', detail: 'detail-video', threshold: 68 },
    ];

    function updateSteps(pct, message) {
      let activeIdx = -1;
      STEPS.forEach((s, i) => {
        const el  = document.getElementById(s.id);
        const nxt = STEPS[i + 1]?.threshold ?? 101;
        if (pct >= nxt) {
          el.className = 'step done';
        } else if (pct >= s.threshold) {
          el.className = 'step active';
          activeIdx = i;
        } else {
          el.className = 'step';
        }
      });
      if (activeIdx >= 0 && message) {
        const detailEl = document.getElementById(STEPS[activeIdx].detail);
        if (detailEl) detailEl.textContent = message;
      }
    }

    async function poll() {
      if (!jobId) { window.location.href = '/'; return; }
      try {
        const data = await fetch(`/api/trip/status/${jobId}`).then(r => r.json());
        const pct = data.progress || 0;
        const fill = document.getElementById('progress-fill');
        fill.style.width = `${Math.max(pct, 4)}%`;
        fill.classList.toggle('working', data.status === 'running');
        updateSteps(pct, data.message);

        if (data.status === 'done') {
          videoPath = data.videoPath;
          textPath  = data.textPath;
          assembly    = data.assembly;
          orientation = data.orientation || 'landscape';
          showDone(data);
        } else if (data.status === 'error') {
          document.getElementById('stage-title') && (document.querySelector('.stage-title').textContent = 'Something went wrong');
          document.getElementById('progress-label').textContent = data.error;
        } else {
          setTimeout(poll, 1200);
        }
      } catch { setTimeout(poll, 2500); }
    }

    function showDone(data) {
      document.getElementById('processing-state').style.display = 'none';
      document.getElementById('done-area').classList.add('visible');
      if (typeof window.celebrateOrb === 'function') {
        window.onCelebProgress = function (p) {
          const eyebrow = document.getElementById('done-eyebrow');
          const meta    = document.getElementById('done-meta');
          const r = Math.round(58  + p * (139 - 58));
          const g = Math.round(96  + p * (191 - 96));
          const b = Math.round(144 + p * (232 - 144));
          const col = `rgb(${r},${g},${b})`;
          if (eyebrow) eyebrow.style.color = col;
          if (meta)    meta.style.color    = col;
        };
        window.celebrateOrb();
      }

      const days = data.dayCount || '?';
      document.getElementById('done-title').textContent = `${days}-Day Trip`;
      document.getElementById('done-meta').textContent  = `${days} days of footage assembled`;

      if (data.videoPath) {
        const dir = data.videoPath.replace(/\/[^/]+$/, '');
        document.getElementById('done-location-path').textContent = dir;
      }

      if (data.journalText) {
        document.getElementById('done-journal-text').textContent = data.journalText.trim();
        document.getElementById('done-journal-wrap').style.display = 'block';
      }
    }

    function revealInFinder() {
      if (videoPath) window.electronAPI.openPath(videoPath.replace(/\/[^/]+$/, ''));
    }

    async function changeOutputFolder() {
      const folder = await window.electronAPI.selectFolder();
      if (!folder) return;
      await fetch('/api/settings', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ outputFolder: folder }),
      });
      document.getElementById('done-location-path').textContent = 'Saved here next time: ' + folder;
    }

    async function exportXML() {
      if (!assembly) return;
      try {
        const res  = await fetch('/api/export/fcpxml', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ assembly, title: document.getElementById('done-title').textContent, orientation }),
        });
        const data = await res.json();
        if (data.ok) window.electronAPI.openPath(data.filePath);
      } catch (err) { console.error('XML export failed:', err); }
    }

    function openVideo() { if (videoPath) window.electronAPI.openPath(videoPath); }
    function openText()  { if (textPath)  window.electronAPI.openPath(textPath); }
    function goHome()    { sessionStorage.removeItem('tripJobId'); window.location.href = '/'; }

    document.addEventListener('DOMContentLoaded', () => { startOrbs(); poll(); });
  </script>
</body>
</html>
