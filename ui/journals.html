<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Slice of Life — Your Slices</title>
  <link rel="stylesheet" href="/icons/tabler-icons.min.css">
  <link rel="stylesheet" href="/css/main.css">
  <style>
    .page {
      display: flex; flex-direction: column; flex: 1; overflow: hidden;
    }

    .page-header {
      display: flex; align-items: center; gap: 14px;
      padding: 20px 28px 16px; flex-shrink: 0;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .back-btn {
      background: none; border: none; color: #3A6090;
      font-size: 20px; cursor: pointer; padding: 4px;
      display: flex; align-items: center;
      transition: color 0.15s;
      -webkit-app-region: no-drag;
    }
    .back-btn:hover { color: #6A9FD4; }
    .page-title { font-size: 16px; font-weight: 600; color: #FFF; }

    /* ── Grid ────────────────────────────────────────────────────────────────── */
    .grid-wrap {
      flex: 1; overflow-y: auto; padding: 20px 28px 28px;
      scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.08) transparent;
    }
    .grid-wrap::-webkit-scrollbar { width: 4px; }
    .grid-wrap::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 12px;
    }

    .card {
      border-radius: 12px; overflow: hidden;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      cursor: pointer; transition: border-color 0.2s, transform 0.2s;
    }
    .card:hover { border-color: rgba(255,255,255,0.25); transform: translateY(-2px); }

    .card-thumb {
      width: 100%; aspect-ratio: 16/9;
      background: rgba(30,95,200,0.1);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; position: relative;
    }
    .card-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .card-thumb-icon { font-size: 28px; color: rgba(91,158,240,0.3); }
    .card-trip-badge {
      position: absolute; top: 7px; right: 7px;
      background: rgba(30,95,200,0.8); border-radius: 6px;
      padding: 2px 7px; font-size: 10px; color: #B8D0EE; font-weight: 600;
    }

    .card-body { padding: 10px 12px 12px; }
    .card-name { font-size: 12px; font-weight: 500; color: #FFF;
                 white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-date { font-size: 11px; color: #3A6090; margin-top: 3px; }
    .card-actions {
      display: flex; gap: 6px; margin-top: 10px;
    }
    .card-btn {
      flex: 1; padding: 6px; font-size: 11px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 8px;
      color: #6A9FD4; cursor: pointer; font-family: inherit;
      display: flex; align-items: center; justify-content: center; gap: 4px;
      transition: background 0.15s;
    }
    .card-btn:hover { background: rgba(255,255,255,0.12); }

    /* ── Detail panel ────────────────────────────────────────────────────────── */
    .detail-overlay {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.6); backdrop-filter: blur(6px);
      z-index: 50; display: none; align-items: flex-end;
    }
    .detail-overlay.open { display: flex; }

    .detail-panel {
      width: 100%; max-height: 75%;
      background: #0D1E35;
      border-top: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px 16px 0 0;
      display: flex; flex-direction: column;
      animation: slideUp 0.25s cubic-bezier(0.4,0,0.2,1);
    }
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to   { transform: translateY(0); }
    }

    .detail-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px 12px; border-bottom: 1px solid rgba(255,255,255,0.07);
      flex-shrink: 0;
    }
    .detail-name  { font-size: 15px; font-weight: 600; color: #FFF; }
    .detail-close {
      background: none; border: none; color: #3A6090; font-size: 20px;
      cursor: pointer; padding: 4px; display: flex;
    }
    .detail-close:hover { color: #6A9FD4; }

    .detail-body {
      flex: 1; overflow-y: auto; padding: 16px 20px 20px;
      scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.08) transparent;
    }
    .detail-journal {
      font-size: 13px; color: #B8D0EE; line-height: 1.75;
      font-style: italic; white-space: pre-wrap; margin-bottom: 20px;
    }
    .detail-actions { display: flex; gap: 8px; }
    .detail-btn-primary {
      flex: 2; padding: 12px;
      background: linear-gradient(135deg,#1E5FC8,#1448A0);
      border: none; border-radius: 10px;
      color: #FFF; font-size: 13px; font-weight: 600;
      cursor: pointer; font-family: inherit;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .detail-btn-secondary {
      flex: 1; padding: 12px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12); border-radius: 10px;
      color: #6A9FD4; font-size: 13px;
      cursor: pointer; font-family: inherit;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }

    .empty-state {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      flex: 1; gap: 12px; color: #3A6090; text-align: center; padding: 40px;
    }
    .empty-state i { font-size: 40px; opacity: 0.4; }
    .empty-state p { font-size: 13px; line-height: 1.6; max-width: 260px; }
  </style>
</head>
<body>
  <div class="app-window">
    <div class="title-bar">
      <div class="traffic-lights">
        <div class="dot dot-red"    onclick="window.electronAPI.windowControl('close')"></div>
        <div class="dot dot-yellow" onclick="window.electronAPI.windowControl('minimize')"></div>
        <div class="dot dot-green"  onclick="window.electronAPI.windowControl('maximize')"></div>
      </div>
      <span class="app-name">Slice of Life</span>
    </div>

    <div class="inner">
      <canvas id="orbs"></canvas>

      <div class="page">
        <div class="page-header">
          <button class="back-btn" onclick="window.location.href='/'"><i class="ti ti-arrow-left"></i></button>
          <div class="page-title">Your Slices</div>
        </div>

        <div class="grid-wrap" id="grid-wrap">
          <div class="empty-state" id="empty-state" style="display:none;">
            <i class="ti ti-book"></i>
            <p>No Slices yet. Drop your footage on the home screen to create your first one.</p>
          </div>
          <div class="grid" id="grid"></div>
        </div>
      </div>

      <!-- Detail panel -->
      <div class="detail-overlay" id="detail-overlay" onclick="closeDetail(event)">
        <div class="detail-panel" id="detail-panel">
          <div class="detail-header">
            <div class="detail-name" id="detail-name"></div>
            <button class="detail-close" onclick="closeDetail()"><i class="ti ti-x"></i></button>
          </div>
          <div class="detail-body">
            <div class="detail-journal" id="detail-journal"></div>
            <div class="detail-actions">
              <button class="detail-btn-primary"   id="detail-watch"><i class="ti ti-player-play"></i> Watch</button>
              <button class="detail-btn-secondary" id="detail-read"> <i class="ti ti-book"></i> Read</button>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script src="/js/orbs.js"></script>
  <script>
    let journals = [];

    function formatDate(mtime) {
      const d = new Date(mtime);
      return d.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
    }

    async function loadJournals() {
      const { journals: data } = await fetch('/api/journals/all').then(r => r.json());
      journals = data || [];

      const grid = document.getElementById('grid');
      grid.innerHTML = '';

      if (!journals.length) {
        document.getElementById('empty-state').style.display = 'flex';
        return;
      }

      for (const j of journals) {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <div class="card-thumb">
            <img src="/api/journals/thumbnail?videoPath=${encodeURIComponent(j.videoPath)}"
                 loading="lazy" onerror="this.style.display='none'">
            <i class="ti ti-${j.isTrip ? 'map-2' : 'video'} card-thumb-icon" style="position:absolute;"></i>
            ${j.isTrip ? '<div class="card-trip-badge">TRIP</div>' : ''}
          </div>
          <div class="card-body">
            <div class="card-name">${escHtml(j.name)}</div>
            <div class="card-date">${formatDate(j.mtime)}</div>
            <div class="card-actions">
              <button class="card-btn" onclick="event.stopPropagation(); openVideo('${escHtml(j.videoPath)}')">
                <i class="ti ti-player-play"></i> Watch
              </button>
              ${j.textPath ? `<button class="card-btn" onclick="event.stopPropagation(); openDetail(${journals.indexOf(j)})">
                <i class="ti ti-book"></i> Read
              </button>` : ''}
            </div>
          </div>`;
        card.addEventListener('click', () => openDetail(journals.indexOf(j)));
        grid.appendChild(card);
      }
    }

    async function openDetail(idx) {
      const j = journals[idx];
      if (!j) return;

      document.getElementById('detail-name').textContent = j.name;
      document.getElementById('detail-journal').textContent = 'Loading…';
      document.getElementById('detail-overlay').classList.add('open');

      document.getElementById('detail-watch').onclick = () => openVideo(j.videoPath);
      document.getElementById('detail-read').style.display = j.textPath ? '' : 'none';
      document.getElementById('detail-read').onclick = () => window.electronAPI.openPath(j.textPath);

      if (j.textPath) {
        try {
          const text = await fetch(`/api/journals/text?textPath=${encodeURIComponent(j.textPath)}`).then(r => r.text());
          // Extract just the journal entry paragraph — the block of text between
          // the first and second divider lines (skip title, date, footer, transcripts)
          const lines = text.split('\n');
          const dividers = lines.reduce((acc, l, i) => l.startsWith('─') ? [...acc, i] : acc, []);
          let journalPara = '';
          if (dividers.length >= 2) {
            // Content between first and second divider
            journalPara = lines.slice(dividers[0] + 1, dividers[1]).join('\n').trim();
          } else {
            // Fallback: strip obvious header lines
            journalPara = lines
              .filter(l => !l.startsWith('─') && !l.startsWith('YOUR LIFE') && !/^\d+ narration/.test(l))
              .join('\n').trim();
          }
          document.getElementById('detail-journal').textContent = journalPara || '—';
        } catch {
          document.getElementById('detail-journal').textContent = '';
        }
      } else {
        document.getElementById('detail-journal').textContent = '';
      }
    }

    function closeDetail(e) {
      if (e && e.target !== document.getElementById('detail-overlay')) return;
      document.getElementById('detail-overlay').classList.remove('open');
    }

    function openVideo(p) { window.electronAPI.openPath(p); }

    function escHtml(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    document.addEventListener('DOMContentLoaded', () => {
      startOrbs();
      loadJournals();
    });
  </script>
</body>
</html>
